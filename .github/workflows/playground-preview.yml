name: playground-preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to deploy or clean up.
        required: true
      action:
        description: Deploy or cleanup.
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - cleanup

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  NX_DAEMON: "false"
  NX_TUI: "false"

jobs:
  deploy-preview:
    if: >-
      (github.event_name == 'pull_request' &&
        github.event.action != 'closed' &&
        github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy')
    runs-on: ubuntu-latest
    concurrency:
      group: playground-preview-pr-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 11.5.0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run test:deploy-scripts

      - run: pnpm nx build playground

      - name: Check Cloudflare credentials
        id: credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Cloudflare preview deploy credentials are not configured. Set CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN."

      - name: Prepare preview Wrangler config
        id: prepare
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node scripts/01-prepare-preview-deploy.mjs --pr-number "$PR_NUMBER"

      - name: Comment unconfigured preview
        if: steps.credentials.outputs.configured != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PREVIEW_STATUS: unconfigured
          WORKER_NAME: ${{ steps.prepare.outputs.worker_name }}
        run: node scripts/03-upsert-preview-comment.mjs

      - name: Deploy preview Worker
        if: steps.credentials.outputs.configured == 'true'
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .memory
          pnpm exec wrangler deploy \
            --config "${{ steps.prepare.outputs.preview_config_path }}" \
            --keep-vars \
            --message "PR #${{ github.event.pull_request.number || inputs.pr_number }} preview ${GITHUB_SHA}" \
            2>&1 | tee .memory/wrangler-preview-deploy.log

      - name: Extract preview URL
        if: steps.credentials.outputs.configured == 'true'
        id: preview-url
        run: |
          node scripts/02-extract-preview-url.mjs \
            .memory/wrangler-preview-deploy.log \
            --worker-name "${{ steps.prepare.outputs.worker_name }}"

      - name: Comment preview URL
        if: steps.credentials.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PREVIEW_STATUS: ready
          PREVIEW_URL: ${{ steps.preview-url.outputs.preview_url }}
          WORKER_NAME: ${{ steps.prepare.outputs.worker_name }}
        run: node scripts/03-upsert-preview-comment.mjs

      - name: Comment preview failure
        if: failure() && steps.credentials.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PREVIEW_STATUS: failed
          WORKER_NAME: ${{ steps.prepare.outputs.worker_name }}
        run: node scripts/03-upsert-preview-comment.mjs

  cleanup-preview:
    if: >-
      (github.event_name == 'pull_request' &&
        github.event.action == 'closed' &&
        github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'cleanup')
    runs-on: ubuntu-latest
    concurrency:
      group: playground-preview-pr-${{ github.event.pull_request.number || inputs.pr_number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Cloudflare credentials
        id: credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${CLOUDFLARE_ACCOUNT_ID:-}" ] && [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=false" >> "$GITHUB_OUTPUT"
          echo "::warning::Cloudflare preview cleanup credentials are not configured. Nothing was deleted."

      - name: Delete preview Worker
        if: steps.credentials.outputs.configured == 'true'
        id: cleanup
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: node scripts/04-delete-preview-worker.mjs --pr-number "$PR_NUMBER"

      - name: Comment preview cleanup
        if: steps.credentials.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PREVIEW_STATUS: deleted
          WORKER_NAME: ${{ steps.cleanup.outputs.worker_name }}
        run: node scripts/03-upsert-preview-comment.mjs
