name: v2-ci

on:
  pull_request:
  push:
    branches:
      - main
      - rewrite/**

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t typecheck,test,build
      - run: pnpm nx build-storybook diagram-studio-ui
