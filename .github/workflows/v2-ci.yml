name: v2-ci

on:
  pull_request:
  push:
    branches:
      - main
      - rewrite/**

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: pnpm/action-setup@v5
        with:
          version: 11.5.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:deploy-scripts
      - run: pnpm nx run-many -t typecheck,test,build
      - run: pnpm nx build-storybook diagram-studio-ui
      - name: Publish Storybook to Chromatic
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        run: pnpm nx chromatic diagram-studio-ui -- --branch-name "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" --repository-slug "$GITHUB_REPOSITORY"
